applications:
  - name: MyFrontend
    domain: my-frontend.my-domain.com
    env:
      REST_API_HOST: MyBackend
    image: my-frontend:latest
    ssl: true
    replicas: 3

  - name: MyBackend
    env:
      SECRET_KEY: my-secret-key
    image: my-backend:latest
    replicas: 2

  - name: MyDB
    image: postgres:15
    env:
      POSTGRES_USER: my-user
      POSTGRES_PASSWORD: my-password
      POSTGRES_DB: my-db
    volumes:
      - my-data:/var/lib/postgresql/data
    replicas: 1
